<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sơ đồ mạng AGU động</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #111;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /*
      Hình bạn đang dùng hiển thị theo tỷ lệ khoảng 1272 x 722.
      Nếu sau này đổi ảnh khác, cần chỉnh lại 1272 / 722 cho đúng.
    */
    .map-wrap {
      position: relative;
      width: min(100vw, calc(100vh * 1272 / 722));
      height: min(100vh, calc(100vw * 722 / 1272));
      background: #fff;
      overflow: hidden;
    }

    .network-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      z-index: 1;
      pointer-events: none;
    }

    .traffic-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      z-index: 10;
      pointer-events: none;
    }

    svg,
    svg path,
    .flow {
      fill: none !important;
    }

    .flow {
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 10 12;
      animation: dataFlow 1.4s linear infinite;
      opacity: 0.85;
    }

    .internet {
      stroke: #005cff;
    }

    .backbone {
      stroke: #ff1f1f;
      stroke-width: 4;
    }

    .core {
      stroke: #003ed6;
    }

    .access {
      stroke: #00a63c;
    }

    .server {
      stroke: #ff8a00;
    }

    .camera {
      stroke: #009b4a;
    }

    .wifi {
      stroke: #7a2cff;
    }

    .vpn {
      stroke: #8d3cff;
    }

    .monitor {
      stroke: #00a6c8;
      stroke-width: 2.5;
      stroke-dasharray: 7 10;
    }

    .reverse {
      animation-name: dataFlowReverse;
    }

    .delay-1 {
      animation-delay: -0.2s;
    }

    .delay-2 {
      animation-delay: -0.4s;
    }

    .delay-3 {
      animation-delay: -0.6s;
    }

    .delay-4 {
      animation-delay: -0.8s;
    }

    .delay-5 {
      animation-delay: -1s;
    }

    @keyframes dataFlow {
      from {
        stroke-dashoffset: 0;
      }

      to {
        stroke-dashoffset: -56;
      }
    }

    @keyframes dataFlowReverse {
      from {
        stroke-dashoffset: 0;
      }

      to {
        stroke-dashoffset: 56;
      }
    }

    .packet {
      opacity: 0.95;
      filter:
        drop-shadow(0 0 4px currentColor)
        drop-shadow(0 0 8px currentColor);
    }

    .p-internet {
      fill: #005cff;
      color: #005cff;
    }

    .p-backbone {
      fill: #ff1f1f;
      color: #ff1f1f;
    }

    .p-core {
      fill: #003ed6;
      color: #003ed6;
    }

    .p-access {
      fill: #00a63c;
      color: #00a63c;
    }

    .p-server {
      fill: #ff8a00;
      color: #ff8a00;
    }

    .p-camera {
      fill: #009b4a;
      color: #009b4a;
    }

    .p-wifi {
      fill: #7a2cff;
      color: #7a2cff;
    }

    .toolbar {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 100;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .toolbar button {
      border: 0;
      border-radius: 6px;
      padding: 8px 12px;
      background: rgba(0, 60, 150, 0.9);
      color: #fff;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
    }

    .toolbar button:hover {
      background: rgba(0, 90, 200, 0.95);
    }

    .traffic-off .flow,
    .traffic-off .packet {
      opacity: 0;
    }

    .speed-slow .flow {
      animation-duration: 2.4s;
    }

    .speed-normal .flow {
      animation-duration: 1.4s;
    }

    .speed-fast .flow {
      animation-duration: 0.65s;
    }

    @media (max-width: 768px) {
      body {
        overflow: auto;
      }

      .map-wrap {
        min-width: 1000px;
        min-height: 568px;
      }

      .toolbar button {
        padding: 6px 8px;
        font-size: 12px;
      }
    }
  </style>
</head>

<body>

  <div class="toolbar">
    <button onclick="toggleTraffic()">Bật / Tắt hiệu ứng</button>
    <button onclick="setSpeed('slow')">Chậm</button>
    <button onclick="setSpeed('normal')">Bình thường</button>
    <button onclick="setSpeed('fast')">Nhanh</button>
    <button onclick="toggleFullscreen()">Toàn màn hình</button>
  </div>

  <div id="mapWrap" class="map-wrap speed-normal">

    <!-- Hình nền sơ đồ mạng -->
    <img src="./network.png" class="network-img" alt="Sơ đồ mạng AGU" />

    <!-- Lớp đường truyền động -->
    <svg class="traffic-layer" viewBox="0 0 1272 722" preserveAspectRatio="none">

      <!-- ===================================================== -->
      <!-- INTERNET -> PEPLINK                                  -->
      <!-- ===================================================== -->

      <path class="flow internet delay-1" d="M195 95 L470 155" />
      <path class="flow internet delay-2" d="M280 90 L485 155" />
      <path class="flow internet delay-3" d="M370 88 L500 155" />
      <path class="flow internet delay-4" d="M465 88 L510 155" />
      <path class="flow internet delay-5" d="M560 88 L520 155" />
      <path class="flow internet delay-1" d="M655 90 L535 155" />
      <path class="flow internet delay-2" d="M745 95 L545 155" />

      <!-- ===================================================== -->
      <!-- PEPLINK -> FIREWALL -> CORE                           -->
      <!-- ===================================================== -->

      <path class="flow backbone" d="M505 170 L505 205" />

      <path class="flow backbone delay-1" d="M505 230 L455 275" />
      <path class="flow backbone delay-2" d="M505 230 L620 275" />

      <!-- Core HA / MLAG -->
      <path class="flow backbone delay-3" d="M455 295 L620 295" />
      <path class="flow backbone reverse delay-4" d="M620 310 L455 310" />

      <!-- ===================================================== -->
      <!-- CORE -> DISTRIBUTION                                  -->
      <!-- ===================================================== -->

      <path class="flow core delay-1" d="M455 315 L360 365" />
      <path class="flow core delay-2" d="M455 315 L475 365" />
      <path class="flow core delay-3" d="M620 315 L590 365" />
      <path class="flow core delay-4" d="M620 315 L710 365" />

      <path class="flow core reverse delay-1" d="M360 365 L455 315" />
      <path class="flow core reverse delay-2" d="M710 365 L620 315" />

      <!-- ===================================================== -->
      <!-- DISTRIBUTION -> ACCESS LAYER                           -->
      <!-- ===================================================== -->

      <!-- Khu văn phòng khoa -->
      <path class="flow access delay-1" d="M360 385 L280 440" />

      <!-- Khu hội trường -->
      <path class="flow access delay-2" d="M360 385 L365 440" />

      <!-- Khối nhà A -->
      <path class="flow access delay-3" d="M475 385 L450 440" />

      <!-- Khối nhà B -->
      <path class="flow access delay-4" d="M475 385 L540 440" />

      <!-- Khối nhà C -->
      <path class="flow access delay-5" d="M590 385 L625 440" />

      <!-- Khối nhà D -->
      <path class="flow access delay-1" d="M590 385 L720 440" />

      <!-- Khối Thí nghiệm TH -->
      <path class="flow access delay-2" d="M710 385 L820 440" />

      <!-- Khối Thư viện -->
      <path class="flow access delay-3" d="M360 385 L280 535" />

      <!-- Khối Hiệu bộ HB1/HB2 -->
      <path class="flow access delay-4" d="M475 385 L370 535" />

      <!-- Khu vực ngoài trời -->
      <path class="flow access delay-5" d="M475 385 L470 535" />

      <!-- Khu thể thao -->
      <path class="flow access delay-1" d="M590 385 L590 535" />

      <!-- Khu thực nghiệm -->
      <path class="flow access delay-2" d="M590 385 L705 535" />

      <!-- Khoa sư phạm -->
      <path class="flow access delay-3" d="M710 385 L800 535" />

      <!-- Khu nhà khách -->
      <path class="flow access delay-4" d="M710 385 L900 535" />

      <!-- ===================================================== -->
      <!-- CORE -> DMZ / SERVER / VPN / CAMERA / NMS              -->
      <!-- ===================================================== -->

      <!-- Core -> DMZ -->
      <path class="flow vpn delay-1" d="M620 285 L865 190" />

      <!-- Core -> Dịch vụ / Server -->
      <path class="flow server delay-1" d="M620 285 L930 245" />
      <path class="flow server delay-2" d="M620 300 L930 300" />
      <path class="flow server reverse delay-3" d="M930 330 L620 315" />

      <!-- Core -> VPN / KTX -->
      <path class="flow vpn delay-2" d="M865 190 L1110 190" />
      <path class="flow vpn reverse delay-3" d="M1110 220 L930 330" />

      <!-- Core -> Camera -->
      <path class="flow camera delay-1" d="M710 385 L1065 420" />
      <path class="flow camera delay-2" d="M1065 420 L1115 380" />
      <path class="flow camera reverse delay-4" d="M1120 470 L710 400" />

      <!-- Core -> Giám sát / NMS -->
      <path class="flow monitor delay-1" d="M620 315 L1090 500" />
      <path class="flow monitor delay-2" d="M710 365 L1090 535" />
      <path class="flow monitor delay-3" d="M505 315 L1090 570" />

      <!-- Ruckus / WiFi controller -->
      <path class="flow wifi delay-1" d="M455 315 L140 395" />
      <path class="flow wifi delay-2" d="M140 395 L140 515" />
      <path class="flow wifi reverse delay-5" d="M140 515 L455 315" />

      <!-- ===================================================== -->
      <!-- CHẤM DỮ LIỆU CHẠY                                     -->
      <!-- ===================================================== -->

      <circle class="packet p-internet" r="4">
        <animateMotion dur="3s" repeatCount="indefinite" path="M195 95 L470 155" />
      </circle>

      <circle class="packet p-backbone" r="4">
        <animateMotion dur="2s" repeatCount="indefinite" path="M505 170 L505 205 L505 230 L455 275" />
      </circle>

      <circle class="packet p-core" r="4">
        <animateMotion dur="2.8s" repeatCount="indefinite" path="M455 315 L360 365" />
      </circle>

      <circle class="packet p-access" r="4">
        <animateMotion dur="3.5s" repeatCount="indefinite" path="M475 385 L540 440" />
      </circle>

      <circle class="packet p-server" r="4">
        <animateMotion dur="4s" repeatCount="indefinite" path="M620 285 L930 245" />
      </circle>

      <circle class="packet p-camera" r="4">
        <animateMotion dur="4s" repeatCount="indefinite" path="M710 385 L1065 420 L1115 380" />
      </circle>

      <circle class="packet p-wifi" r="4">
        <animateMotion dur="4.5s" repeatCount="indefinite" path="M455 315 L140 395 L140 515" />
      </circle>

    </svg>
  </div>

  <script>
    function toggleTraffic() {
      document.getElementById("mapWrap").classList.toggle("traffic-off");
    }

    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
      } else {
        document.exitFullscreen();
      }
    }

    function setSpeed(speed) {
      const map = document.getElementById("mapWrap");
      map.classList.remove("speed-slow", "speed-normal", "speed-fast");

      if (speed === "slow") {
        map.classList.add("speed-slow");
      } else if (speed === "fast") {
        map.classList.add("speed-fast");
      } else {
        map.classList.add("speed-normal");
      }
    }
  </script>

</body>
</html>
